<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البث المباشر | منصة الفيديو</title>
    <style>
        /* ================= CSS (التصميم) ================= */
        :root {
            --primary-color: #e50914; /* لون أحمر مميز */
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --text-light: #ffffff;
            --text-muted: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            line-height: 1.6;
        }

        /* شريط التنقل (Header) */
        header {
            background-color: var(--surface-color);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .nav-links li a {
            color: var(--text-light);
            text-decoration: none;
            transition: color 0.3s;
        }

        .nav-links li a:hover {
            color: var(--primary-color);
        }

        /* زر القائمة للهواتف */
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        /* الحاوية الرئيسية */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 5%;
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 20px;
        }

        /* قسم الفيديو */
        .video-section {
            background-color: var(--surface-color);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* نسبة العرض إلى الارتفاع 16:9 */
            height: 0;
            overflow: hidden;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-info {
            padding: 20px;
        }

        .live-badge {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(229, 9, 20, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(229, 9, 20, 0); }
            100% { box-shadow: 0 0 0 0 rgba(229, 9, 20, 0); }
        }

        /* قسم الدردشة أو التفاصيل الجانبية */
        .sidebar {
            background-color: var(--surface-color);
            border-radius: 10px;
            padding: 20px;
            height: fit-content;
        }

        .sidebar h3 {
            margin-bottom: 15px;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 5px;
            display: inline-block;
        }

        /* التجاوب مع الشاشات الصغيرة (Responsive) */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr; /* عرض عمودي بالكامل */
            }
            
            .nav-links {
                display: none; /* إخفاء الروابط في الموبايل */
                flex-direction: column;
                position: absolute;
                top: 60px;
                right: 0;
                background-color: var(--surface-color);
                width: 100%;
                text-align: center;
                padding: 20px 0;
                border-top: 1px solid #333;
            }

            .nav-links.active {
                display: flex;
            }

            .menu-toggle {
                display: block;
            }
        }
    </style>
</head>
<body>

    <!-- ================= HTML (الهيكل) ================= -->
    <header>
        <div class="logo">موقعي للبث</div>
        <button class="menu-toggle" id="mobile-menu-btn">☰</button>
        <ul class="nav-links" id="nav-links">
            <li><a href="#">الرئيسية</a></li>
            <li><a href="#">المباريات المباشرة</a></li>
            <li><a href="#">الأخبار</a></li>
            <li><a href="#">اتصل بنا</a></li>
        </ul>
    </header>

    <main class="container">
        <!-- قسم مشغل الفيديو -->
        <section class="video-section">
            <div class="video-container">
                <!-- هنا تم وضع الرابط الخاص بك داخل الـ iframe -->
                <iframe 
                    src="https://xyzadhamatya-vercel-app.goalz.zip/?m=30717&lang=ar&domain_name=test2" 
                    allowfullscreen>
                </iframe>
            </div>
            <div class="video-info">
                <span class="live-badge">مباشر الآن 🔴</span>
                <h1 id="video-title">عنوان البث المباشر يكتب هنا</h1>
                <p style="color: var(--text-muted); margin-top: 10px;">
                    استمتع بمشاهدة البث المباشر بأعلى جودة وبدون تقطيع. يتم تحديث البث تلقائياً.
                </p>
            </div>
        </section>

        <!-- القسم الجانبي (يمكن استخدامه للدردشة أو إحصائيات) -->
        <aside class="sidebar">
            <h3>تفاصيل الحدث</h3>
            <p style="color: var(--text-muted); font-size: 14px;">
                <strong>المشاهدين:</strong> <span id="viewers-count">1,245</span><br>
                <strong>الجودة:</strong> HD 1080p<br>
                <strong>الحالة:</strong> مستقر
            </p>
            <hr style="border: 0; border-top: 1px solid #333; margin: 15px 0;">
            <p style="font-size: 13px; color: #888;">
                * إذا توقف البث، قم بتحديث الصفحة.
            </p>
        </aside>
    </main>

    <!-- ================= JavaScript (التفاعل) ================= -->
    <script>
        // تفعيل قائمة الهاتف المحمول (Mobile Menu Toggle)
        const menuBtn = document.getElementById('mobile-menu-btn');
        const navLinks = document.getElementById('nav-links');

        menuBtn.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        // سكريبت بسيط لتغيير عدد المشاهدين بشكل عشوائي لإعطاء طابع حي للموقع
        setInterval(() => {
            const viewersElement = document.getElementById('viewers-count');
            let currentViewers = parseInt(viewersElement.innerText.replace(',', ''));
            // زيادة أو نقصان عشوائي من -5 إلى +15
            let change = Math.floor(Math.random() * 20) - 5; 
            currentViewers += change;
            viewersElement.innerText = currentViewers.toLocaleString();
        }, 5000); // يتحدث كل 5 ثوانٍ
    </script>
</body>
</html>
